<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Attendance System</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            background: #020617;
            border-bottom: 2px solid #1e293b;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            gap: 30px;
            flex-wrap: wrap;
        }

        .camera-box {
            background: #020617;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,255,200,0.2);
        }

        img {
            border-radius: 10px;
            width: 640px;
            height: auto;
        }

        .info-box {
            background: #020617;
            padding: 20px;
            border-radius: 15px;
            width: 250px;
            box-shadow: 0 0 20px rgba(0,255,200,0.2);
        }

        .info-box h2 {
            margin-bottom: 10px;
            color: #00ffc3;
        }

        .status {
            font-size: 18px;
            margin-top: 10px;
        }

        .footer {
            margin-top: 40px;
            padding: 10px;
            color: #94a3b8;
            font-size: 14px;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>

<body>

<header>
    Smart Attendance System 🚀
</header>

<div class="container">

    <div class="camera-box">
        <h2>Live Camera Feed</h2>
        <img src="/video">
    </div>

    <div class="info-box">
        <h2>System Status</h2>
        <div class="status">
            <span class="dot"></span> Camera Active
        </div>
        <div class="status">
            Face Recognition Running
        </div>
        <div class="status">
            Attendance Logging Enabled
        </div>
        <div class="status" style="margin-top:15px; color:#00ffc3;">
            Secure & Real-Time Detection
        </div>
    </div>

</div>

<div class="footer">
    Developed for Smart Attendance using AI • Exhibition Ready
</div>

</body>
</html>
